on\/14555-"}]}}</script><script type="application/ld+json">{"@context":"https://schema.org","@type":"QAPage","mainEntity":{"@type":"Question","name":"How much salary does a grad from NALSAR NLSIU grabs?","text":"How much salary does a grad from NALSAR NLSIU grabs?","answerCount":2,"dateCreated":"2021-09-03 10:35:41","author":{"@type":"Person","name":"Officials"},"suggestedAnswer":{"@type":"Answer","text":"<div class=\"cdcms_courses\">\r\n<p>One of my cousins graduated from Nalsar University of Law and here is what I gathered from my conversations with her.&nbsp;</p>\r\n\r\n<ul>\r\n\t<li aria-level=\"1\">NALSAR, NLSIU offers a lot of degrees, but if we talk about B.A. LLB. in particular, then as an entry-level associate you can earn around INR 15 to 17 LPA on average.</li>\r\n\t<li aria-level=\"1\">India&#39;s top six Corporate law firms offer around INR 1.2 L as monthly remuneration at entry-level, also you will get a yearly bonus of around INR 2 to 3 lakhs.</li>\r\n\t<li aria-level=\"1\">Equity partners can earn around INR 2 CPA and upwards. The Tier II firms offer packages ranging between 8-12 LPA. In the current industry scenario, a lot of mid-tier firms are giving packages that are comparable to top-tier Law Firms.</li>\r\n\t<li aria-level=\"1\">Foreign law firms offer salary packages of around INR 8 to 50 LPA for the first couple of years to freshers. These figures increase with your seniority.</li>\r\n</ul>\r\n\r\n<p>Also, you should note that the above-mentioned figures do not include any false inflated salary components. This is the in-hand salary that you will be getting.&nbsp;</p>\r\n\r\n<p>The income tax rate is also very less for lawyers. These opportunities are open for any law school graduate if you are hard-working and dedicated. It does not really matter whether you are from NLSIU and NALSAR.</p>\r\n\r\n<p></p>\r\n</div>","dateCreated":"2021-09-03 10:35:41","upvoteCount":0,"url":"https://collegedunia.com/qna?question_id=14555#answer-11546","author":{
